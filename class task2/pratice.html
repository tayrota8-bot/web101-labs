<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITE Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h2>ITE Shop</h2>

    <div class="cart-icon">
        Cart <span id="cart-count">0</span>
    </div>
</nav>

<div class="container">

    <div class="products">

        <div class="card">
            <h3>Keyboard</h3>
            <p>$25.50</p>
            <button onclick="addToCart('Keyboard',25.50)">Add to cart</button>
        </div>

        <div class="card">
            <h3>Mouse</h3>
            <p>$12.00</p>
            <button onclick="addToCart('Mouse',12.00)">Add to cart</button>
        </div>

        <div class="card">
            <h3>Monitor</h3>
            <p>$149.99</p>
            <button onclick="addToCart('Monitor',149.99)">Add to cart</button>
        </div>

        <div class="card">
            <h3>USB Hub</h3>
            <p>$18.75</p>
            <button onclick="addToCart('USB Hub',18.75)">Add to cart</button>
        </div>

    </div>

    <div class="cart">
    <h2>Your Cart</h2>

    <ul id="cartList"></ul>

    <h3>Total: $<span id="total">0.00</span></h3>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
