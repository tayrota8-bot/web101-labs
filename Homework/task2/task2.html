<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Grade Checker</h1>

    <div class="input-box">
        <input type="number" id="score" min="0" max="100" placeholder="0 - 100">
        <button onclick="checkGrade()">Check</button>
    </div>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
